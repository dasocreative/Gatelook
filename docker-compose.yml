version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: anpr_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anpr_saas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: anpr_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anpr_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - static_data:/app/static
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=anpr_saas
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MOCK_VISION_PIPELINE=False  # Toggle False to use real weights on CUDA/CPU
      - YOLO_VEHICLE_MODEL=yolov8n.pt
      - YOLO_PLATE_MODEL=https://github.com/ablanco1950/LicensePlate_Yolov8_Filters_PaddleOCR/raw/main/best.pt
      - FRAME_SKIP=3
      - STATIC_DIR=/app/static
      - CROPS_DIR=/app/static/crops
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anpr_celery_worker
    restart: always
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info -c 2
    volumes:
      - ./backend:/app
      - static_data:/app/static
    environment:
      - ENV=development
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=anpr_saas
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MOCK_VISION_PIPELINE=False
      - YOLO_VEHICLE_MODEL=yolov8n.pt
      - YOLO_PLATE_MODEL=https://github.com/ablanco1950/LicensePlate_Yolov8_Filters_PaddleOCR/raw/main/best.pt
      - FRAME_SKIP=3
      - STATIC_DIR=/app/static
      - CROPS_DIR=/app/static/crops
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anpr_frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  static_data:
